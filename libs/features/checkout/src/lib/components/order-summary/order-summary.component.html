<section class="order-summary">
  <h2>Your Order</h2>
  @if (orderSummary().restaurantName) {
    <p class="order-summary-restaurant">{{ orderSummary().restaurantName }}</p>
  }

  <div class="order-summary-items">
    @for (item of orderSummary().items; track item.id) {
      <lib-cart-item [item]="item" />
    }
  </div>

  <lib-cart-summary />
</section>
