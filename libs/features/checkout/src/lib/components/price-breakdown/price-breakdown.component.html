<section class="price-breakdown">
  <h2>Price Details</h2>

  <div class="price-row">
    <span>Subtotal</span>
    <span>₹{{ orderSummary().subtotal }}</span>
  </div>

  <div class="price-row">
    <span>Taxes</span>
    <span>₹{{ orderSummary().taxAmount }}</span>
  </div>

  <div class="price-row">
    <span>Delivery Fee</span>
    <span>₹{{ orderSummary().deliveryFee }}</span>
  </div>

  <div class="price-row total">
    <span>Grand Total</span>
    <span>₹{{ orderSummary().totalAmount }}</span>
  </div>
</section>
