<ul class="order-items">
  @for (item of items; track item.id) {
    <li class="order-item">
      <span class="order-item-quantity">{{ item.quantity }}x</span>
      <span class="order-item-name">{{ item.menuItemName ?? 'Item' }}</span>
      <span class="order-item-price">₹{{ item.totalPrice }}</span>
    </li>
  }
</ul>
