<div class="restaurant-dashboard-page">
  <h1>Dashboard</h1>

  @if (loading()) {
    <lib-skeleton [count]="4" />
  } @else if (error()) {
    <lib-error-state [message]="error()!" (retry)="retry()" />
  } @else {
    <div class="restaurant-dashboard-metrics">
      @for (metric of metrics(); track metric.key) {
        <lib-metric-card [label]="metric.label" [value]="metric.value" />
      }
    </div>
  }

  <div class="restaurant-dashboard-quick-actions">
    <h2>Quick Actions</h2>
    <div class="restaurant-dashboard-quick-actions-list">
      <a routerLink="/orders" class="quick-action">View Orders</a>
      <a routerLink="/menu" class="quick-action">Manage Menu</a>
    </div>
  </div>
</div>
