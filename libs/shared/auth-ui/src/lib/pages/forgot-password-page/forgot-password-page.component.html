<lib-auth-layout [brandName]="brandName">
  <lib-auth-card
    title="Reset your password"
    subtitle="Enter the email associated with your account and we'll send you a reset link"
  >
    @if (submitted()) {
      <p class="success-message">
        If an account exists for that email, a reset link has been sent. Check your inbox and
        follow the link to choose a new password.
      </p>
    } @else {
      <lib-forgot-password-form
        [loading]="loading()"
        [errorMessage]="error()"
        (submitted)="onSubmit($event)"
      />
    }
    <span auth-card-footer>Remembered your password? <a routerLink="/auth/login">Log in</a></span>
  </lib-auth-card>
</lib-auth-layout>
