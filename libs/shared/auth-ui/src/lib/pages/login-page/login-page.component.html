<lib-auth-layout [brandName]="brandName">
  <lib-auth-card title="Welcome back" subtitle="Log in to continue to {{ brandName }}">
    <lib-login-form [loading]="loading()" [errorMessage]="error()" (submitted)="onSubmit($event)" />
    @if (registerCta) {
      <span auth-card-footer>Don't have an account? <a [routerLink]="registerCta.path">{{ registerCta.label }}</a></span>
    }
  </lib-auth-card>
</lib-auth-layout>
