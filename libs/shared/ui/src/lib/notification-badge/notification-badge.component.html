<button type="button" class="notification-badge" aria-label="Open notifications" (click)="activated.emit()">
  <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path
      d="M6 9.5a6 6 0 0 1 12 0c0 3.2 1 5 1.6 5.9a.9.9 0 0 1-.75 1.4H5.15a.9.9 0 0 1-.75-1.4C5 14.5 6 12.7 6 9.5Z"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linejoin="round"
    />
    <path d="M9.5 19.5a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
  </svg>
  @if (count > 0) {
    <span class="notification-badge-count">{{ count > 99 ? '99+' : count }}</span>
  }
</button>
