<form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  @if (errorMessage) {
    <div class="form-alert" role="alert">{{ errorMessage }}</div>
  }

  <div class="form-field">
    <label for="reset-password-new">New password</label>
    <input
      id="reset-password-new"
      type="password"
      autocomplete="new-password"
      formControlName="newPassword"
      [class.invalid]="form.controls.newPassword.invalid && form.controls.newPassword.touched"
    />
    @if (form.controls.newPassword.invalid && form.controls.newPassword.touched) {
      <span class="form-field-error">Password must be at least 8 characters.</span>
    }
  </div>

  <div class="form-field">
    <label for="reset-password-confirm">Confirm new password</label>
    <input
      id="reset-password-confirm"
      type="password"
      autocomplete="new-password"
      formControlName="confirmPassword"
      [class.invalid]="form.controls.confirmPassword.touched && form.errors?.['passwordMismatch']"
    />
    @if (form.controls.confirmPassword.touched && form.errors?.['passwordMismatch']) {
      <span class="form-field-error">Passwords do not match.</span>
    }
  </div>

  <button type="submit" class="form-submit" [disabled]="loading">
    {{ loading ? 'Resetting…' : 'Reset password' }}
  </button>
</form>
