<div class="pagination">
  @if (total !== undefined) {
    <span class="pagination-summary">{{ total }} total</span>
  }
  <div class="pagination-controls">
    <button type="button" class="pagination-button" (click)="previous()" [disabled]="!canGoPrevious">Previous</button>
    <span class="pagination-page">Page {{ page }} of {{ totalPages }}</span>
    <button type="button" class="pagination-button" (click)="next()" [disabled]="!canGoNext">Next</button>
  </div>
</div>
