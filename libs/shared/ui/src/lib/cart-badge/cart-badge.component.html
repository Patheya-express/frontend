<button type="button" class="cart-badge" aria-label="Open cart" (click)="activated.emit()">
  <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path
      d="M4 5h2l2.2 11.2a2 2 0 0 0 2 1.6h7a2 2 0 0 0 2-1.6L20.5 9H7"
      stroke="currentColor"
      stroke-width="1.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="10" cy="20.5" r="1.4" fill="currentColor" />
    <circle cx="17.5" cy="20.5" r="1.4" fill="currentColor" />
  </svg>
  @if (count > 0) {
    <span class="cart-badge-count">{{ count > 99 ? '99+' : count }}</span>
  }
</button>
