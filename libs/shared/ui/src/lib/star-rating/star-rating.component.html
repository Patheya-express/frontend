<div class="star-rating" [class.editable]="editable" [class]="'size-' + size" role="img" [attr.aria-label]="rating + ' out of 5 stars'">
  @for (star of stars; track star) {
    @if (editable) {
      <button
        type="button"
        class="star star-button"
        [attr.aria-label]="'Rate ' + star + ' out of 5'"
        (click)="select(star)"
      >
        <svg viewBox="0 0 24 24" [class.filled]="star <= rating">
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
      </button>
    } @else {
      <span class="star">
        <svg viewBox="0 0 24 24" class="star-outline">
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
        <svg viewBox="0 0 24 24" class="star-filled" [style.clip-path]="'inset(0 ' + (100 - fillPercent(star)) + '% 0 0)'">
          <path
            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
          />
        </svg>
      </span>
    }
  }
</div>
