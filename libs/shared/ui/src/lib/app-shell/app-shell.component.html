<div class="app-shell">
  <lib-header
    [isAuthenticated]="isAuthenticated"
    [cartItemCount]="cartItemCount"
    [notificationCount]="notificationCount"
    [deliveryLocationLabel]="deliveryLocationLabel"
    [searchValue]="searchValue"
    [avatarUrl]="avatarUrl"
    [firstName]="firstName"
    (logoutRequested)="logoutRequested.emit()"
    (cartToggled)="cartToggled.emit()"
    (notificationsToggled)="notificationsToggled.emit()"
    (locationPickerClicked)="locationPickerClicked.emit()"
    (searchSubmitted)="searchSubmitted.emit($event)"
  />
  <main class="app-shell-content">
    <router-outlet />
  </main>
  <lib-footer />
</div>
