@if (open) {
  <div class="confirm-dialog-backdrop">
    <div class="confirm-dialog" role="alertdialog" aria-modal="true" [attr.aria-label]="title">
      <h2 class="confirm-dialog-title">{{ title }}</h2>
      @if (message) {
        <p class="confirm-dialog-message">{{ message }}</p>
      }
      <div class="confirm-dialog-actions">
        <button type="button" class="confirm-dialog-cancel" [disabled]="busy" (click)="onCancel()">
          {{ cancelLabel }}
        </button>
        <button
          type="button"
          class="confirm-dialog-confirm"
          [class.is-danger]="tone === 'danger'"
          [disabled]="busy"
          (click)="onConfirm()"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}
