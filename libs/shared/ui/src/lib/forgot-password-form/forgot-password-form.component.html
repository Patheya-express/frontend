<form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  @if (errorMessage) {
    <div class="form-alert" role="alert">{{ errorMessage }}</div>
  }

  <div class="form-field">
    <label for="forgot-password-email">Email</label>
    <input
      id="forgot-password-email"
      type="email"
      autocomplete="email"
      formControlName="email"
      [class.invalid]="form.controls.email.invalid && form.controls.email.touched"
    />
    @if (form.controls.email.invalid && form.controls.email.touched) {
      <span class="form-field-error">Enter a valid email address.</span>
    }
  </div>

  <button type="submit" class="form-submit" [disabled]="loading">
    {{ loading ? 'Sending…' : 'Send reset link' }}
  </button>
</form>
