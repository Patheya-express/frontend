<div class="error-state">
  <div class="error-state-illustration" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" fill="var(--color-error-soft)" />
      <path d="M32 20v16" stroke="var(--color-error)" stroke-width="2" stroke-linecap="round" />
      <circle cx="32" cy="42" r="1.75" fill="var(--color-error)" />
    </svg>
  </div>

  <h2>{{ title }}</h2>
  <p>{{ message }}</p>

  <button type="button" class="error-state-retry" (click)="retry.emit()">Try again</button>
</div>
