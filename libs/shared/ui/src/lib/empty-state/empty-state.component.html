<div class="empty-state">
  <div class="empty-state-illustration" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" fill="var(--color-secondary-soft)" />
      <path
        d="M20 26h24l-2.2 16.2a3 3 0 0 1-3 2.6H25.2a3 3 0 0 1-3-2.6L20 26Z"
        stroke="var(--color-text-subtle)"
        stroke-width="1.6"
        stroke-linejoin="round"
      />
      <path d="M24 26v-2a8 8 0 0 1 16 0v2" stroke="var(--color-text-subtle)" stroke-width="1.6" stroke-linecap="round" />
      <path d="M26 33h12" stroke="var(--color-text-subtle)" stroke-width="1.6" stroke-linecap="round" />
    </svg>
  </div>

  <h2>{{ title }}</h2>
  @if (message) {
    <p>{{ message }}</p>
  }

  <button type="button" class="empty-state-refresh" (click)="refresh.emit()">{{ actionLabel }}</button>
</div>
