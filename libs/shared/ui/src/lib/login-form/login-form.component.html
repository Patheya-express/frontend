<form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  @if (errorMessage) {
    <div class="form-alert" role="alert">{{ errorMessage }}</div>
  }

  <div class="form-field">
    <label for="login-email">Email</label>
    <input
      id="login-email"
      type="email"
      autocomplete="email"
      formControlName="email"
      [class.invalid]="form.controls.email.invalid && form.controls.email.touched"
    />
    @if (form.controls.email.invalid && form.controls.email.touched) {
      <span class="form-field-error">Enter a valid email address.</span>
    }
  </div>

  <div class="form-field">
    <label for="login-password">Password</label>
    <input
      id="login-password"
      type="password"
      autocomplete="current-password"
      formControlName="password"
      [class.invalid]="form.controls.password.invalid && form.controls.password.touched"
    />
    @if (form.controls.password.invalid && form.controls.password.touched) {
      <span class="form-field-error">Password must be at least 8 characters.</span>
    }
  </div>

  <button type="submit" class="form-submit" [disabled]="loading">
    {{ loading ? 'Logging in…' : 'Log in' }}
  </button>
</form>
