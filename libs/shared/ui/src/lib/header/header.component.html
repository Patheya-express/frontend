<header class="app-header">
  <div class="app-header-inner">
    <a class="brand" href="/" aria-label="Patheya Express home">
      <span class="brand-mark">P</span>
      <span class="brand-name">Patheya Express</span>
    </a>

    <button type="button" class="location-picker">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          d="M12 21s-7-6.35-7-11.5A7 7 0 0 1 19 9.5C19 14.65 12 21 12 21Z"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linejoin="round"
        />
        <circle cx="12" cy="9.5" r="2.25" stroke="currentColor" stroke-width="1.6" />
      </svg>
      <span class="location-picker-text">
        <span class="location-picker-label">Deliver to</span>
        <span class="location-picker-value">Select a location</span>
      </span>
      <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m7 10 5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    <div class="search-bar" role="search">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6" />
        <path d="m20 20-3.6-3.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </svg>
      <input type="text" placeholder="Search for restaurants and food" />
    </div>

    <lib-cart-badge [count]="cartItemCount" (activated)="cartToggled.emit()" />

    <div class="account">
      @if (isAuthenticated) {
        <button
          type="button"
          class="user-avatar"
          aria-label="Account menu"
          [attr.aria-expanded]="menuOpen()"
          (click)="toggleMenu()"
        >
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8.5" r="3.25" stroke="currentColor" stroke-width="1.6" />
            <path
              d="M4.75 19.25c1.4-3 4.3-4.75 7.25-4.75s5.85 1.75 7.25 4.75"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        </button>

        @if (menuOpen()) {
          <div class="account-menu">
            <a class="account-menu-item" routerLink="/orders" (click)="closeMenu()">My Orders</a>
            <button type="button" class="account-menu-item" (click)="onLogout()">Log out</button>
          </div>
        }
      } @else {
        <a class="user-avatar" routerLink="/auth/login" aria-label="Log in">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8.5" r="3.25" stroke="currentColor" stroke-width="1.6" />
            <path
              d="M4.75 19.25c1.4-3 4.3-4.75 7.25-4.75s5.85 1.75 7.25 4.75"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        </a>
      }
    </div>
  </div>
</header>
