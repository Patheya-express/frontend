name: Docker Build

# PR-time build+smoke-test only — never pushes anywhere, never touches AWS. The real publish
# pipeline (ECR + SBOM + Trivy gate + Cosign sign + GitOps PR) is frontend-release.yml, triggered
# only on a push to main. This split mirrors patheya-express-platform's backend-ci.yml /
# backend-release.yml separation.

on:
  pull_request:

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer-app, restaurant-app, admin-app, delivery-app]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/frontend.Dockerfile
          build-args: |
            APP_NAME=${{ matrix.app }}
            BUILD_CONFIGURATION=production
          push: false
          load: true
          tags: patheya-express-${{ matrix.app }}:ci
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Smoke-test the built image
        run: |
          set -euo pipefail
          IMAGE="patheya-express-${{ matrix.app }}:ci"
          docker run -d --name smoke -p 8080:8080 "$IMAGE"
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              echo "✓ ${{ matrix.app }} image is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "✗ ${{ matrix.app }} image never became healthy"
          docker logs smoke
          exit 1
