# Base nginx process config shared by every frontend app image.
# Each app's Dockerfile copies this file to /etc/nginx/nginx.conf and its own
# server block (see infrastructure/docker/nginx/app.conf.template) to
# /etc/nginx/conf.d/default.conf.

worker_processes auto;
pid /tmp/nginx.pid;

# Non-root runtime (see Dockerfile: `user app`) — nginx can't bind to the
# default /var/run/nginx.pid or write logs outside its own writable dirs.
events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Structured JSON access log with a correlation id (request id + optional
  # upstream-supplied X-Request-Id) so logs can be shipped to a central
  # aggregator (ELK/CloudWatch/Loki) and joined with backend request logs.
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"request_id":"$request_id",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$uri",'
      '"query":"$args",'
      '"status":$status,'
      '"body_bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"referer":"$http_referer",'
      '"user_agent":"$http_user_agent"'
    '}';

  access_log /dev/stdout json_combined;
  error_log /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  client_max_body_size 2m;
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 10s;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 512;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/geo+json
    image/svg+xml
    font/ttf
    font/otf
    font/woff
    font/woff2;

  # Shared rate-limit zone for all app server blocks (LH1-style protection at
  # the edge, independent of any rate limiting the backend API applies).
  limit_req_zone $binary_remote_addr zone=static_zone:10m rate=60r/s;
  limit_req_status 429;

  include /etc/nginx/conf.d/*.conf;
}
