# Shared security headers, `include`-d into every location block that also
# sets its own add_header directive.
#
# nginx does NOT merge add_header lists across nesting levels: a location
# that declares even one add_header of its own silently drops every
# add_header inherited from its parent server block (this bit us once — the
# server-level headers were entirely missing from /index.html and every
# cached asset response until this file was introduced and included
# explicitly everywhere). Locations with no add_header of their own (the SPA
# fallback, the .map deny) still inherit directly from the server block and
# don't need this include.

add_header X-Request-Id $request_id always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
add_header X-XSS-Protection "1; mode=block" always;
# HSTS is only meaningful behind TLS; the ingress/load balancer terminates
# TLS in every real deployment (see infrastructure/kubernetes), so this is
# safe to send unconditionally.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
