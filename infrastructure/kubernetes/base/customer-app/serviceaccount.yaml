apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-app
  labels:
    app.kubernetes.io/name: customer-app
    app.kubernetes.io/part-of: patheya-express
    app.kubernetes.io/component: frontend
# nginx serving a static bundle never calls the Kubernetes API — the most
# least-privilege RBAC for this workload is no RBAC at all. No Role is
# bound to this ServiceAccount, and the token isn't even mounted into the
# pod, closing off the default service-account-token attack surface
# entirely rather than granting-and-restricting it.
automountServiceAccountToken: false
