apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: customer-app
  labels:
    app.kubernetes.io/name: customer-app
    app.kubernetes.io/part-of: patheya-express
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: customer-app
  # minReplicas is overridden per environment via each overlay's `replicas:`
  # field, which kustomize also applies to the Deployment this targets —
  # keeping HPA's floor equal to the Deployment's baseline replica count.
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
