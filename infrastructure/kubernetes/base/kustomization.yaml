apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - customer-app
  - restaurant-app
  - admin-app
  - delivery-app
  - default-deny-all.yaml
  - rbac-ci-deployer.yaml
  - rbac-viewer-binding.yaml
  - podmonitor.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
    includeTemplates: true
