# Standard upstream metrics-server manifest (kubernetes-sigs/metrics-server),
# vendored rather than referenced as a remote kustomize base — this repo's
# own validation runs kubectl kustomize offline (see
# infrastructure/docs/kubernetes-architecture.md's Validation section), and
# a remote base would silently stop being reproducible the moment GitHub
# is unreachable at apply time. Pinned to v0.7.2. Required for the HPAs in
# infrastructure/kubernetes/base/*/hpa.yaml to have any CPU/memory metrics
# to scale on at all — without this installed, `kubectl get hpa` shows
# <unknown> for every target forever.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-server
  namespace: patheya-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:metrics-server
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
rules:
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:metrics-server
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:metrics-server
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: patheya-system
---
# Lets the API server's aggregation layer delegate auth decisions —
# standard requirement for any Kubernetes aggregated API server, not
# specific to metrics-server.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metrics-server-auth-reader
  namespace: kube-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: patheya-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-server:system:auth-delegator
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: metrics-server
    namespace: patheya-system
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-server
  namespace: patheya-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
spec:
  selector:
    app.kubernetes.io/name: metrics-server
  ports:
    - port: 443
      targetPort: https
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: patheya-system
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-server
    spec:
      serviceAccountName: metrics-server
      priorityClassName: patheya-critical-priority
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metrics-server
          image: registry.k8s.io/metrics-server/metrics-server:v0.7.2
          args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
            # Many managed/kubeadm clusters serve kubelet metrics on a
            # self-signed cert with no cluster-recognized CA. Remove this
            # flag on a cluster where kubelet serving certs are properly
            # signed (e.g. via kubelet-csr-approver) — leaving it on
            # everywhere would silently accept a spoofed kubelet.
            - --kubelet-insecure-tls
          ports:
            - name: https
              containerPort: 10250
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: https
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 64Mi
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1beta1.metrics.k8s.io
  labels:
    app.kubernetes.io/name: metrics-server
    app.kubernetes.io/part-of: patheya-express-platform
spec:
  service:
    name: metrics-server
    namespace: patheya-system
    port: 443
  group: metrics.k8s.io
  version: v1beta1
  insecureSkipTLSVerify: true
  groupPriorityMinimum: 100
  versionPriority: 100
