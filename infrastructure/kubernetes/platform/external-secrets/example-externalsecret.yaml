# EXAMPLE ONLY — not referenced by any kustomization.yaml in this repo, and
# will not be applied by `kubectl apply -k` anywhere. None of the four
# frontend apps have a secret to manage today (see
# infrastructure/docs/kubernetes-architecture.md's Configuration & Secrets
# section, and infrastructure/docs/secrets-guide.md from Phase 0 — every
# value in an Angular environment.*.ts file ends up in the public browser
# bundle, so nothing that belongs there is ever secret in the first
# place). This file exists purely to show the intended pattern for the
# first time a real one shows up, so Phase 2 doesn't have to invent it
# from scratch.
#
# Requires the External Secrets Operator (external-secrets.io) installed
# on the cluster — not provisioned by this repo, same "prepare, don't
# provision" scope as cert-manager and ExternalDNS.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  # Would need to exist in every namespace that has an ExternalSecret
  # referencing it — SecretStore is namespace-scoped; use ClusterSecretStore
  # instead if the same AWS Secrets Manager access should be shared across
  # patheya-express-dev/staging/prod.
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # Prefer IRSA (IAM Roles for Service Accounts) over a static key —
        # references a ServiceAccount annotated with
        # eks.amazonaws.com/role-arn, never a long-lived AWS access key
        # committed anywhere.
        jwt:
          serviceAccountRef:
            name: external-secrets-irsa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-frontend-secret
spec:
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: example-frontend-secret
    creationPolicy: Owner
  refreshInterval: 1h
  data:
    - secretKey: example-key
      remoteRef:
        # Illustrative path only — no such secret exists in any AWS
        # account tied to this project.
        key: patheya-express/frontend/example
